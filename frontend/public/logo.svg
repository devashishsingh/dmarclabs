<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Diamond logomark -->
  <g transform="translate(0, 4)">
    <!-- Glow layer -->
    <rect x="6" y="6" width="28" height="28" rx="3" fill="#ef233c" opacity="0.25" transform="rotate(45 20 20)" filter="url(#blur)"/>
    <!-- Main diamond -->
    <rect x="8" y="8" width="24" height="24" rx="2.5" fill="#ef233c" transform="rotate(45 20 20)"/>
    <!-- Inner highlight -->
    <rect x="14" y="14" width="12" height="12" rx="1.5" fill="white" opacity="0.12" transform="rotate(45 20 20)"/>
  </g>

  <!-- Wordmark -->
  <text
    x="52"
    y="32"
    font-family="Manrope, system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-0.5"
  >DMARC Labs</text>

  <defs>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
</svg>
